name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-validate:
    name: Lint & Validate (Ubuntu ${{ matrix.ubuntu }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        ubuntu: [ "22.04", "24.04" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Bash syntax
        run: |
          bash -n certbot-repo-deployment-bootstrap.sh

      - name: Install lint/format tools
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          sudo apt-get install -y golang-go
          go install mvdan.cc/sh/v3/cmd/shfmt@latest
          echo "${HOME}/go/bin" >> "${GITHUB_PATH}"

      - name: ShellCheck (fail on warnings)
        run: |
          shellcheck -S warning certbot-repo-deployment-bootstrap.sh

      - name: shfmt (check formatting)
        run: |
          shfmt -d -i 4 -ci -sr certbot-repo-deployment-bootstrap.sh